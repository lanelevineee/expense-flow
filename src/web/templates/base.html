<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Expense Tracker{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#f1f5f9;--muted:#94a3b8;--primary:#3b82f6;--primary-hover:#2563eb;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
.container{max-width:960px;margin:0 auto;padding:16px}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
nav .brand{font-size:1.1rem;font-weight:700}
nav .links{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
nav .links a{color:var(--muted);font-size:.8rem;padding:4px 8px;border-radius:var(--radius)}
nav .links a:hover,nav .links a.active{color:var(--text);background:var(--surface2)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-size:1rem;margin-bottom:12px;color:var(--muted)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.stat{background:var(--surface2);border-radius:var(--radius);padding:16px;text-align:center}
.stat .value{font-size:1.8rem;font-weight:700}
.stat .label{font-size:.8rem;color:var(--muted);margin-top:4px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-size:.8rem;text-transform:uppercase}
td{font-size:.9rem}
.btn{display:inline-block;padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:.9rem;font-weight:500}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:4px 10px;font-size:.8rem}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:.9rem}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
.empty{text-align:center;padding:40px;color:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:.9rem;z-index:100;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.stat-grid{grid-template-columns:1fr 1fr}nav .links{gap:6px}nav .links a{font-size:.7rem;padding:3px 5px}}
</style>
</head>
<body>
<nav>
  <div class="brand">Expense Tracker</div>
  <div class="links">
    <a href="/dashboard">Dashboard</a>
    <a href="/expenses">Expenses</a>
    <a href="/analytics">Analytics</a>
    <a href="/staff" id="navStaff">Staff</a>
    <a href="/categories">Categories</a>
    <a href="/recurring">Recurring</a>
    <a href="/gamification">Gamification</a>
    <a href="/settings">Settings</a>
    <a href="#" onclick="logout()" style="color:var(--danger)">Logout</a>
  </div>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
<script>
function getToken(){return localStorage.getItem("token")}
function setToken(t){localStorage.setItem("token",t)}
function logout(){localStorage.removeItem("token");localStorage.removeItem("refresh");localStorage.removeItem("staff_id");localStorage.removeItem("staff_name");localStorage.removeItem("role");window.location.href="/login"}
function isAdmin(){return localStorage.getItem("role")=="admin"}
async function api(url,opts={}){
  const t=getToken();
  const headers={"Content-Type":"application/json",...(opts.headers||{})};
  if(t)headers["Authorization"]="Bearer "+t;
  const r=await fetch(url,{...opts,headers});
  if(r.status===401){logout();throw new Error("Unauthorized")}
  return r.json();
}
function toast(msg){
  const d=document.createElement("div");d.className="toast";d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),3000);
}
document.addEventListener("DOMContentLoaded",function(){
  if(!isAdmin()){
    var s=document.getElementById("navStaff");if(s)s.style.display="none";
  }
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
