{% extends "base.html" %}
{% block title %}Categories - Expense Tracker{% endblock %}
{% block content %}
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2 style="margin:0">Categories</h2>
    <button class="btn btn-primary btn-sm" onclick="showAdd()" id="addCatBtn">+ Add Category</button>
  </div>
  <table>
    <thead><tr><th>Name</th><th>Icon</th><th>Budget</th><th id="actionsHead"></th></tr></thead>
    <tbody id="catTable"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
  </table>
</div>
<div class="card" id="addForm" style="display:none">
  <h2>Add Category</h2>
  <form onsubmit="saveCat(event)">
    <div class="form-group"><label>Name</label><input type="text" id="cName" required></div>
    <div class="form-group"><label>Icon</label><input type="text" id="cIcon" value="other"></div>
    <div class="form-group"><label>Monthly Budget</label><input type="number" id="cBudget" step="0.01" min="0" value="0"></div>
    <div style="display:flex;gap:8px">
      <button type="submit" class="btn btn-primary">Save</button>
      <button type="button" class="btn" style="background:var(--surface2);color:var(--text)" onclick="hideAdd()">Cancel</button>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
var admin=isAdmin();
if(!admin){
  var b=document.getElementById("addCatBtn");if(b)b.style.display="none";
  var h=document.getElementById("actionsHead");if(h)h.style.display="none";
}
async function loadCats(){
  const data=await api("/api/categories");
  const tbody=document.getElementById("catTable");
  if(!data.length){tbody.innerHTML='<tr><td colspan="4" class="empty">No categories</td></tr>';return;}
  tbody.innerHTML=data.map(c=>'<tr><td>'+c.name+'</td><td>'+c.icon+'</td><td>$'+Number(c.budget).toFixed(2)+'</td>'+(admin?'<td><button class="btn btn-danger btn-sm" onclick="deleteCat('+c.id+')">x</button></td>':'<td></td>')+'</tr>').join("");
}
function showAdd(){document.getElementById("addForm").style.display="block";}
function hideAdd(){document.getElementById("addForm").style.display="none";}
async function saveCat(e){
  e.preventDefault();
  await api("/api/categories",{method:"POST",body:JSON.stringify({
    name:document.getElementById("cName").value,
    icon:document.getElementById("cIcon").value,
    budget:parseFloat(document.getElementById("cBudget").value)||0
  })});
  toast("Category added");hideAdd();loadCats();
}
async function deleteCat(id){
  if(!confirm("Delete this category?"))return;
  await api("/api/categories/"+id,{method:"DELETE"});
  toast("Deleted");loadCats();
}
loadCats();
</script>
{% endblock %}
