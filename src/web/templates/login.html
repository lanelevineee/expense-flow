<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Expense Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#f1f5f9;--muted:#94a3b8;--primary:#3b82f6;--primary-hover:#2563eb;--danger:#ef4444;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:380px;margin:16px}
.login-box h1{text-align:center;font-size:1.4rem;margin-bottom:8px}
.login-box .sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px}
.form-group input{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:.95rem}
.form-group input:focus{outline:none;border-color:var(--primary)}
.btn{width:100%;padding:12px;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
.btn:hover{background:var(--primary-hover)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{color:var(--danger);font-size:.85rem;text-align:center;margin-top:8px;display:none}
.mfa-section{display:none}
.links{text-align:center;margin-top:16px;font-size:.85rem}
.links a{color:var(--primary)}
</style>
</head>
<body>
<div class="login-box">
  <h1>Expense Tracker</h1>
  <p class="sub">Sign in with your email and password</p>
  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@company.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="Enter your password">
    </div>
    <div class="mfa-section" id="mfaSection">
      <div class="form-group">
        <label>MFA Code (if enabled)</label>
        <input type="text" id="totpCode" placeholder="6-digit code" maxlength="6" pattern="[0-9]{6}">
      </div>
    </div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
    <div class="error" id="error"></div>
  </form>
  <div class="links">
    <a href="/register">Create a new account</a>
  </div>
</div>
<script>
const form=document.getElementById("loginForm");
const errEl=document.getElementById("error");
const mfaSection=document.getElementById("mfaSection");
form.addEventListener("submit",async(e)=>{
  e.preventDefault();
  errEl.style.display="none";
  const btn=document.getElementById("loginBtn");
  btn.disabled=true;btn.textContent="Signing in...";
  try{
    const body={
      email:document.getElementById("email").value,
      password:document.getElementById("password").value,
    };
    const code=document.getElementById("totpCode").value.trim();
    if(code)body.totp_code=code;
    const r=await fetch("/api/auth/login",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    const data=await r.json();
    if(!r.ok){
      if(data.detail==="MFA required"){
        mfaSection.style.display="block";
        errEl.textContent="Enter your MFA code";errEl.style.display="block";
      }else{
        errEl.textContent=(typeof data.detail==="object"?data.detail.errors.join(", "):data.detail)||"Login failed";
        errEl.style.display="block";
      }
      return;
    }
    localStorage.setItem("token",data.access_token);
    localStorage.setItem("refresh",data.refresh_token);
    localStorage.setItem("staff_id",data.staff_id);
    localStorage.setItem("staff_name",data.name);
    localStorage.setItem("role",data.role);
    window.location.href="/dashboard";
  }catch(err){errEl.textContent="Connection error";errEl.style.display="block";}
  finally{btn.disabled=false;btn.textContent="Sign In";}
});
</script>
</body>
</html>
