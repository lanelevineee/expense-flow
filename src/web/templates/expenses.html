{% extends "base.html" %}
{% block title %}Expenses - Expense Tracker{% endblock %}
{% block content %}
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2 style="margin:0">Expenses</h2>
    <button class="btn btn-primary btn-sm" onclick="showAdd()">+ New Expense</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <input type="text" id="searchInput" placeholder="Search..." style="padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:.85rem;flex:1;min-width:120px" oninput="loadExpenses()">
    <select id="sortSelect" style="padding:8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:.85rem" onchange="loadExpenses()">
      <option value="date_desc">Newest first</option>
      <option value="date_asc">Oldest first</option>
      <option value="amount_desc">Highest amount</option>
      <option value="amount_asc">Lowest amount</option>
    </select>
  </div>
  <table>
    <thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Description</th><th></th></tr></thead>
    <tbody id="expTable"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
  </table>
</div>

<div class="card" id="addForm" style="display:none">
  <h2>Add Expense</h2>
  <form onsubmit="saveExpense(event)">
    <div class="form-group"><label>Amount</label><input type="number" id="amount" step="0.01" min="0.01" required></div>
    <div class="form-group"><label>Category</label><select id="category"></select></div>
    <div class="form-group"><label>Description</label><input type="text" id="description" placeholder="Optional"></div>
    <div class="form-group"><label>Date</label><input type="date" id="expDate"></div>
    <div style="display:flex;gap:8px">
      <button type="submit" class="btn btn-primary">Save</button>
      <button type="button" class="btn" style="background:var(--surface2);color:var(--text)" onclick="hideAdd()">Cancel</button>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const SID=localStorage.getItem("staff_id");
let categories=[];

async function loadCategories(){
  categories=await api("/api/categories");
  const sel=document.getElementById("category");
  sel.innerHTML=categories.map(c=>'<option value="'+c.name+'">'+c.name+'</option>').join("");
}

async function loadExpenses(){
  const search=document.getElementById("searchInput").value;
  const sort=document.getElementById("sortSelect").value;
  let url="/api/expenses?staff_id="+SID+"&sort_by="+sort;
  if(search)url+="&search="+encodeURIComponent(search);
  const data=await api(url);
  const tbody=document.getElementById("expTable");
  if(data.length===0){tbody.innerHTML='<tr><td colspan="5" class="empty">No expenses found</td></tr>';return;}
  tbody.innerHTML=data.map(e=>'<tr><td>'+(e.expense_date||"")+'</td><td>'+e.category+'</td><td>$'+Number(e.amount).toFixed(2)+'</td><td>'+(e.description||"")+'</td><td><button class="btn btn-danger btn-sm" onclick="deleteExpense('+e.id+')">x</button></td></tr>').join("");
}

function showAdd(){document.getElementById("addForm").style.display="block";document.getElementById("expDate").value=new Date().toISOString().slice(0,10);}
function hideAdd(){document.getElementById("addForm").style.display="none";}

async function saveExpense(e){
  e.preventDefault();
  await api("/api/expenses",{method:"POST",body:JSON.stringify({
    staff_id:parseInt(SID),amount:parseFloat(document.getElementById("amount").value),
    category:document.getElementById("category").value,
    description:document.getElementById("description").value,
    expense_date:document.getElementById("expDate").value
  })});
  toast("Expense added");hideAdd();loadExpenses();
}

async function deleteExpense(id){
  if(!confirm("Delete this expense?"))return;
  await api("/api/expenses/"+id,{method:"DELETE"});
  toast("Expense deleted");loadExpenses();
}

loadCategories();loadExpenses();
</script>
{% endblock %}
