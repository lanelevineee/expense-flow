{% extends "base.html" %}
{% block title %}Recurring - Expense Tracker{% endblock %}
{% block content %}
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2 style="margin:0">Recurring Expenses</h2>
    <button class="btn btn-primary btn-sm" onclick="showAdd()">+ Add Recurring</button>
  </div>
  <table>
    <thead><tr><th>Category</th><th>Amount</th><th>Frequency</th><th>Next Date</th><th>Active</th><th></th></tr></thead>
    <tbody id="recTable"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
  </table>
</div>
<div class="card" id="addForm" style="display:none">
  <h2>Add Recurring Expense</h2>
  <form onsubmit="saveRec(event)">
    <div class="form-group"><label>Category</label><input type="text" id="rCat" required></div>
    <div class="form-group"><label>Amount</label><input type="number" id="rAmt" step="0.01" min="0.01" required></div>
    <div class="form-group"><label>Description</label><input type="text" id="rDesc"></div>
    <div class="form-group"><label>Frequency</label>
      <select id="rFreq"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly" selected>Monthly</option><option value="yearly">Yearly</option></select>
    </div>
    <div class="form-group"><label>Next Date</label><input type="date" id="rNext"></div>
    <div style="display:flex;gap:8px">
      <button type="submit" class="btn btn-primary">Save</button>
      <button type="button" class="btn" style="background:var(--surface2);color:var(--text)" onclick="hideAdd()">Cancel</button>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
const SID=localStorage.getItem("staff_id");
async function loadRec(){
  const data=await api("/api/recurring?staff_id="+SID);
  const tbody=document.getElementById("recTable");
  if(!data.length){tbody.innerHTML='<tr><td colspan="6" class="empty">No recurring expenses</td></tr>';return;}
  tbody.innerHTML=data.map(r=>'<tr><td>'+r.category+'</td><td>$'+Number(r.amount).toFixed(2)+'</td><td>'+r.frequency+'</td><td>'+r.next_date+'</td><td>'+(r.is_active?'Yes':'No')+'</td><td><button class="btn btn-danger btn-sm" onclick="deleteRec('+r.id+')">x</button></td></tr>').join("");
}
function showAdd(){document.getElementById("addForm").style.display="block";document.getElementById("rNext").value=new Date().toISOString().slice(0,10);}
function hideAdd(){document.getElementById("addForm").style.display="none";}
async function saveRec(e){
  e.preventDefault();
  await api("/api/recurring",{method:"POST",body:JSON.stringify({
    staff_id:parseInt(SID),amount:parseFloat(document.getElementById("rAmt").value),
    category:document.getElementById("rCat").value,
    description:document.getElementById("rDesc").value,
    frequency:document.getElementById("rFreq").value,
    next_date:document.getElementById("rNext").value
  })});
  toast("Recurring expense added");hideAdd();loadRec();
}
async function deleteRec(id){
  if(!confirm("Delete?"))return;
  await api("/api/recurring/"+id,{method:"DELETE"});
  toast("Deleted");loadRec();
}
loadRec();
</script>
{% endblock %}
